<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBuddy - Care Reminder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <div class="logo">🧠✨</div>
    
    <div id="login-form">
        <h2>Welcome Back</h2>
        <div class="input-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="Enter your email">
        </div>
        <div class="input-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password">
        </div>
        <button class="btn" onclick="login()">Log In</button>
        <p class="toggle-text">New here? <a href="#" onclick="toggleAuth()">Create an account</a></p>
    </div>

    <div id="signup-form" class="hidden">
        <h2>Create Profile</h2>
        <div class="input-group">
            <label for="user-name">Name</label>
            <input type="text" id="user-name" placeholder="What should we call you?">
        </div>
        <div class="input-group">
            <label for="user-age">Age</label>
            <input type="number" id="user-age" placeholder="Your age">
        </div>
        <div class="input-group">
            <label for="user-condition">Main Focus / Challenge</label>
            <select id="user-condition">
                <option value="memory">Memory Reminders</option>
                <option value="autism">Autism / Routine Support</option>
                <option value="mental-health">Mental Health Support</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="input-group">
            <label for="med-name">Medicine Name</label>
            <input type="text" id="med-name" placeholder="e.g., Vitamin D">
        </div>
        <div class="input-group">
            <label for="med-time">Reminder Time</label>
            <input type="time" id="med-time">
        </div>
        <div class="input-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="Choose an email">
        </div>
        <div class="input-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Create a password">
        </div>
        <button class="btn" onclick="signup()">Start My Journey</button>
        <p class="toggle-text">Already have an account? <a href="#" onclick="toggleAuth()">Log In</a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
